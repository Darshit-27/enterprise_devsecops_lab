<svg width="100%" viewBox="0 0 680 180" xmlns="http://www.w3.org/2000/svg" role="img" style="background:#ffffff;font-family:system-ui,sans-serif">
  <title>CI/CD Pipeline Flow</title>
  <desc>Five-stage pipeline: Git Push to GitHub Actions to CodeQL+Trivy security gates to Docker Build to SSH Deploy on EC2.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Step 1: Git Push -->
  <rect x="20" y="52" width="100" height="76" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="70" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#3C3489" font-family="system-ui,sans-serif">1</text>
  <text x="70" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489" font-family="system-ui,sans-serif">Git Push</text>
  <text x="70" y="116" text-anchor="middle" font-size="10" fill="#534AB7" font-family="system-ui,sans-serif">main branch</text>

  <line x1="120" y1="90" x2="140" y2="90" stroke="#7F77DD" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Step 2: GitHub Actions -->
  <rect x="140" y="52" width="110" height="76" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="195" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#3C3489" font-family="system-ui,sans-serif">2</text>
  <text x="195" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489" font-family="system-ui,sans-serif">GitHub Actions</text>
  <text x="195" y="116" text-anchor="middle" font-size="10" fill="#534AB7" font-family="system-ui,sans-serif">CI triggered</text>

  <line x1="250" y1="90" x2="270" y2="90" stroke="#7F77DD" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Step 3: Security Gates -->
  <rect x="270" y="44" width="120" height="92" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1.2"/>
  <text x="330" y="72" text-anchor="middle" font-size="11" font-weight="600" fill="#712B13" font-family="system-ui,sans-serif">3</text>
  <text x="330" y="88" text-anchor="middle" font-size="12" font-weight="600" fill="#712B13" font-family="system-ui,sans-serif">CodeQL + Trivy</text>
  <text x="330" y="104" text-anchor="middle" font-size="10" fill="#993C1D" font-family="system-ui,sans-serif">SAST + CVE scan</text>
  <text x="330" y="120" text-anchor="middle" font-size="10" fill="#993C1D" font-family="system-ui,sans-serif">⛔ blocks on HIGH+</text>

  <line x1="390" y1="90" x2="410" y2="90" stroke="#993C1D" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Step 4: Docker Build -->
  <rect x="410" y="52" width="108" height="76" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="464" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#0C447C" font-family="system-ui,sans-serif">4</text>
  <text x="464" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#0C447C" font-family="system-ui,sans-serif">Docker Build</text>
  <text x="464" y="116" text-anchor="middle" font-size="10" fill="#185FA5" font-family="system-ui,sans-serif">image tagged</text>

  <line x1="518" y1="90" x2="538" y2="90" stroke="#185FA5" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Step 5: SSH Deploy -->
  <rect x="538" y="52" width="122" height="76" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="599" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#085041" font-family="system-ui,sans-serif">5</text>
  <text x="599" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#085041" font-family="system-ui,sans-serif">SSH Deploy</text>
  <text x="599" y="116" text-anchor="middle" font-size="10" fill="#0F6E56" font-family="system-ui,sans-serif">EC2 · Mumbai</text>

  <!-- Stats row -->
  <text x="340" y="160" text-anchor="middle" font-size="11" fill="#888780" font-family="system-ui,sans-serif">39 CI runs  ·  26 CD deploys  ·  6 CodeQL vulnerabilities detected  ·  CVEs blocked pre-production</text>
</svg>
