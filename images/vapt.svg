<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img" style="background:#ffffff;font-family:system-ui,sans-serif">
  <title>VAPT Attack Surface</title>
  <desc>VAPT findings table and tool mapping showing five vulnerabilities tested against the EC2 target.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Target box -->
  <rect x="240" y="20" width="200" height="50" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="340" y="42" text-anchor="middle" font-size="13" font-weight="600" fill="#085041" font-family="system-ui,sans-serif">AWS EC2 Target</text>
  <text x="340" y="60" text-anchor="middle" font-size="10" fill="#0F6E56" font-family="system-ui,sans-serif">13.126.213.135  ·  Ubuntu 22.04  ·  Mumbai</text>

  <!-- Tool boxes row -->
  <!-- Burp Suite -->
  <rect x="20" y="110" width="104" height="52" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
  <text x="72" y="131" text-anchor="middle" font-size="12" font-weight="600" fill="#791F1F" font-family="system-ui,sans-serif">Burp Suite</text>
  <text x="72" y="148" text-anchor="middle" font-size="10" fill="#A32D2D" font-family="system-ui,sans-serif">SQLi · XSS</text>

  <!-- OWASP ZAP -->
  <rect x="138" y="110" width="104" height="52" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
  <text x="190" y="131" text-anchor="middle" font-size="12" font-weight="600" fill="#791F1F" font-family="system-ui,sans-serif">OWASP ZAP</text>
  <text x="190" y="148" text-anchor="middle" font-size="10" fill="#A32D2D" font-family="system-ui,sans-serif">DAST</text>

  <!-- Nmap -->
  <rect x="256" y="110" width="86" height="52" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
  <text x="299" y="131" text-anchor="middle" font-size="12" font-weight="600" fill="#791F1F" font-family="system-ui,sans-serif">Nmap</text>
  <text x="299" y="148" text-anchor="middle" font-size="10" fill="#A32D2D" font-family="system-ui,sans-serif">Port scan</text>

  <!-- SQLMap -->
  <rect x="356" y="110" width="86" height="52" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
  <text x="399" y="131" text-anchor="middle" font-size="12" font-weight="600" fill="#791F1F" font-family="system-ui,sans-serif">SQLMap</text>
  <text x="399" y="148" text-anchor="middle" font-size="10" fill="#A32D2D" font-family="system-ui,sans-serif">SQL injection</text>

  <!-- Nikto -->
  <rect x="456" y="110" width="86" height="52" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
  <text x="499" y="131" text-anchor="middle" font-size="12" font-weight="600" fill="#791F1F" font-family="system-ui,sans-serif">Nikto</text>
  <text x="499" y="148" text-anchor="middle" font-size="10" fill="#A32D2D" font-family="system-ui,sans-serif">Web scan</text>

  <!-- WhatWeb -->
  <rect x="556" y="110" width="86" height="52" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
  <text x="599" y="131" text-anchor="middle" font-size="12" font-weight="600" fill="#791F1F" font-family="system-ui,sans-serif">WhatWeb</text>
  <text x="599" y="148" text-anchor="middle" font-size="10" fill="#A32D2D" font-family="system-ui,sans-serif">Fingerprint</text>

  <!-- Arrows from tools up to target -->
  <line x1="72"  y1="110" x2="270" y2="70" stroke="#E24B4A" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="190" y1="110" x2="300" y2="70" stroke="#E24B4A" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="299" y1="110" x2="330" y2="70" stroke="#E24B4A" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="399" y1="110" x2="360" y2="70" stroke="#E24B4A" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="499" y1="110" x2="400" y2="70" stroke="#E24B4A" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="599" y1="110" x2="430" y2="70" stroke="#E24B4A" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Findings row -->
  <!-- SQL Injection -->
  <rect x="20" y="194" width="122" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
  <text x="81" y="215" text-anchor="middle" font-size="11" font-weight="600" fill="#791F1F" font-family="system-ui,sans-serif">SQL Injection</text>
  <text x="81" y="231" text-anchor="middle" font-size="10" fill="#A32D2D" font-family="system-ui,sans-serif">/login · CVSS 9.8</text>
  <text x="81" y="244" text-anchor="middle" font-size="10" font-weight="600" fill="#A32D2D" font-family="system-ui,sans-serif">CRITICAL</text>

  <!-- Command Injection -->
  <rect x="156" y="194" width="130" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
  <text x="221" y="215" text-anchor="middle" font-size="11" font-weight="600" fill="#791F1F" font-family="system-ui,sans-serif">Cmd Injection</text>
  <text x="221" y="231" text-anchor="middle" font-size="10" fill="#A32D2D" font-family="system-ui,sans-serif">/ping · CVSS 9.8</text>
  <text x="221" y="244" text-anchor="middle" font-size="10" font-weight="600" fill="#A32D2D" font-family="system-ui,sans-serif">CRITICAL</text>

  <!-- XSS -->
  <rect x="300" y="194" width="100" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="350" y="215" text-anchor="middle" font-size="11" font-weight="600" fill="#633806" font-family="system-ui,sans-serif">XSS</text>
  <text x="350" y="231" text-anchor="middle" font-size="10" fill="#854F0B" font-family="system-ui,sans-serif">/search · CVSS 7.4</text>
  <text x="350" y="244" text-anchor="middle" font-size="10" font-weight="600" fill="#854F0B" font-family="system-ui,sans-serif">HIGH</text>

  <!-- Dir Traversal -->
  <rect x="414" y="194" width="124" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="476" y="215" text-anchor="middle" font-size="11" font-weight="600" fill="#633806" font-family="system-ui,sans-serif">Dir Traversal</text>
  <text x="476" y="231" text-anchor="middle" font-size="10" fill="#854F0B" font-family="system-ui,sans-serif">/download · CVSS 7.5</text>
  <text x="476" y="244" text-anchor="middle" font-size="10" font-weight="600" fill="#854F0B" font-family="system-ui,sans-serif">HIGH</text>

  <!-- File Upload -->
  <rect x="552" y="194" width="106" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text x="605" y="215" text-anchor="middle" font-size="11" font-weight="600" fill="#633806" font-family="system-ui,sans-serif">File Upload</text>
  <text x="605" y="231" text-anchor="middle" font-size="10" fill="#854F0B" font-family="system-ui,sans-serif">/upload · CVSS 6.5</text>
  <text x="605" y="244" text-anchor="middle" font-size="10" font-weight="600" fill="#BA7517" font-family="system-ui,sans-serif">MEDIUM</text>

  <!-- Section label -->
  <text x="340" y="285" text-anchor="middle" font-size="11" fill="#888780" font-family="system-ui,sans-serif">Findings  ·  OWASP Top-10  ·  All tested against 13.126.213.135</text>
</svg>
