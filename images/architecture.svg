<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img" style="background:#ffffff;font-family:system-ui,sans-serif">
  <title>Enterprise CyberSecurity Lab — DevSecOps workflow architecture</title>
  <desc>Two-tier diagram: CI/CD pipeline from Git Push through GitHub Actions, CodeQL+Trivy gates, to EC2 SSH deploy. Bottom shows the AWS EC2 Docker Compose stack: Nginx, Flask App, PostgreSQL, and Monitoring layer.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- SECTION: CI/CD Pipeline -->
  <text x="40" y="32" font-size="11" fill="#888780" letter-spacing="0.08em" font-family="system-ui,sans-serif">CI / CD pipeline</text>
  <line x1="40" y1="38" x2="640" y2="38" stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- Developer -->
  <rect x="40" y="52" width="108" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="94" y="78" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489" font-family="system-ui,sans-serif">Developer</text>
  <text x="94" y="97" text-anchor="middle" font-size="11" fill="#534AB7" font-family="system-ui,sans-serif">git push main</text>

  <line x1="148" y1="80" x2="172" y2="80" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- GitHub Actions -->
  <rect x="172" y="52" width="120" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="232" y="78" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489" font-family="system-ui,sans-serif">GitHub Actions</text>
  <text x="232" y="97" text-anchor="middle" font-size="11" fill="#534AB7" font-family="system-ui,sans-serif">CI workflow trigger</text>

  <line x1="292" y1="80" x2="316" y2="80" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- CodeQL + Trivy -->
  <rect x="316" y="52" width="134" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="383" y="72" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13" font-family="system-ui,sans-serif">CodeQL + Trivy</text>
  <text x="383" y="89" text-anchor="middle" font-size="11" fill="#993C1D" font-family="system-ui,sans-serif">SAST + CVE scan</text>
  <text x="383" y="103" text-anchor="middle" font-size="11" fill="#993C1D" font-family="system-ui,sans-serif">blocks CRITICAL/HIGH</text>

  <line x1="450" y1="80" x2="474" y2="80" stroke="#993C1D" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- SSH Deploy -->
  <rect x="474" y="52" width="116" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="532" y="78" text-anchor="middle" font-size="13" font-weight="500" fill="#085041" font-family="system-ui,sans-serif">SSH deploy</text>
  <text x="532" y="97" text-anchor="middle" font-size="11" fill="#0F6E56" font-family="system-ui,sans-serif">EC2 Mumbai</text>

  <!-- Vertical arrow to EC2 -->
  <line x1="532" y1="108" x2="532" y2="148" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- SECTION: AWS EC2 -->
  <text x="40" y="142" font-size="11" fill="#888780" letter-spacing="0.08em" font-family="system-ui,sans-serif">AWS EC2  ·  ap-south-1  ·  t2.micro  ·  13.126.213.135</text>
  <line x1="40" y1="148" x2="640" y2="148" stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- EC2 container box -->
  <rect x="40" y="162" width="600" height="230" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="60" y="186" font-size="13" font-weight="500" fill="#085041" font-family="system-ui,sans-serif">Docker Compose</text>

  <!-- Nginx -->
  <rect x="62" y="204" width="128" height="68" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="126" y="231" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C" font-family="system-ui,sans-serif">Nginx</text>
  <text x="126" y="249" text-anchor="middle" font-size="11" fill="#185FA5" font-family="system-ui,sans-serif">Reverse proxy</text>
  <text x="126" y="264" text-anchor="middle" font-size="11" fill="#185FA5" font-family="system-ui,sans-serif">Port 80 · SSL</text>

  <line x1="190" y1="238" x2="216" y2="238" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Flask App -->
  <rect x="216" y="204" width="140" height="68" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="286" y="231" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13" font-family="system-ui,sans-serif">Flask app</text>
  <text x="286" y="249" text-anchor="middle" font-size="11" fill="#993C1D" font-family="system-ui,sans-serif">Python · OWASP</text>
  <text x="286" y="264" text-anchor="middle" font-size="11" fill="#993C1D" font-family="system-ui,sans-serif">VAPT target</text>

  <line x1="356" y1="238" x2="382" y2="238" stroke="#993C1D" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- PostgreSQL -->
  <rect x="382" y="204" width="128" height="68" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="446" y="231" text-anchor="middle" font-size="13" font-weight="500" fill="#633806" font-family="system-ui,sans-serif">PostgreSQL</text>
  <text x="446" y="249" text-anchor="middle" font-size="11" fill="#854F0B" font-family="system-ui,sans-serif">Database</text>
  <text x="446" y="264" text-anchor="middle" font-size="11" fill="#854F0B" font-family="system-ui,sans-serif">Vulnerable queries</text>

  <!-- Monitoring divider -->
  <line x1="62" y1="296" x2="510" y2="296" stroke="#9FE1CB" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- CloudWatch -->
  <rect x="62" y="308" width="132" height="44" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="128" y="326" text-anchor="middle" font-size="13" font-weight="500" fill="#444441" font-family="system-ui,sans-serif">CloudWatch</text>
  <text x="128" y="342" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="system-ui,sans-serif">Metrics · alerts</text>

  <!-- Docker Logs -->
  <rect x="208" y="308" width="128" height="44" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="272" y="326" text-anchor="middle" font-size="13" font-weight="500" fill="#444441" font-family="system-ui,sans-serif">Docker logs</text>
  <text x="272" y="342" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="system-ui,sans-serif">Container events</text>

  <!-- Nginx Logs -->
  <rect x="350" y="308" width="132" height="44" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="416" y="326" text-anchor="middle" font-size="13" font-weight="500" fill="#444441" font-family="system-ui,sans-serif">Nginx logs</text>
  <text x="416" y="342" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="system-ui,sans-serif">HTTP access log</text>

  <!-- security.log -->
  <rect x="496" y="308" width="124" height="44" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="558" y="326" text-anchor="middle" font-size="13" font-weight="500" fill="#444441" font-family="system-ui,sans-serif">security.log</text>
  <text x="558" y="342" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="system-ui,sans-serif">App-level events</text>

  <!-- SECTION: VAPT Tools -->
  <line x1="40" y1="412" x2="640" y2="412" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="40" y="426" font-size="11" fill="#888780" letter-spacing="0.08em" font-family="system-ui,sans-serif">VAPT tools  ·  attack surface</text>

  <!-- Burp Suite -->
  <rect x="40" y="438" width="102" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="91" y="456" text-anchor="middle" font-size="13" font-weight="500" fill="#791F1F" font-family="system-ui,sans-serif">Burp Suite</text>
  <text x="91" y="472" text-anchor="middle" font-size="11" fill="#A32D2D" font-family="system-ui,sans-serif">SQLi · XSS</text>

  <!-- OWASP ZAP -->
  <rect x="156" y="438" width="106" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="209" y="456" text-anchor="middle" font-size="13" font-weight="500" fill="#791F1F" font-family="system-ui,sans-serif">OWASP ZAP</text>
  <text x="209" y="472" text-anchor="middle" font-size="11" fill="#A32D2D" font-family="system-ui,sans-serif">DAST scanner</text>

  <!-- Nmap -->
  <rect x="276" y="438" width="90" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="321" y="456" text-anchor="middle" font-size="13" font-weight="500" fill="#791F1F" font-family="system-ui,sans-serif">Nmap</text>
  <text x="321" y="472" text-anchor="middle" font-size="11" fill="#A32D2D" font-family="system-ui,sans-serif">Port scan</text>

  <!-- SQLMap -->
  <rect x="380" y="438" width="96" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="428" y="456" text-anchor="middle" font-size="13" font-weight="500" fill="#791F1F" font-family="system-ui,sans-serif">SQLMap</text>
  <text x="428" y="472" text-anchor="middle" font-size="11" fill="#A32D2D" font-family="system-ui,sans-serif">SQL injection</text>

  <!-- Nikto -->
  <rect x="490" y="438" width="90" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="535" y="456" text-anchor="middle" font-size="13" font-weight="500" fill="#791F1F" font-family="system-ui,sans-serif">Nikto</text>
  <text x="535" y="472" text-anchor="middle" font-size="11" fill="#A32D2D" font-family="system-ui,sans-serif">Web scanner</text>

  <!-- Dashed attack arrow -->
  <path d="M 340 438 L 340 392" fill="none" stroke="#E24B4A" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
</svg>
